spring.application.name=ErrorFreeText

# Подключение к PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:error_free_text}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# Настройки Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Параметры приложения
app.yandex-speller-url=https://speller.yandex.net/services/spellservice.json/checkTexts
app.scheduler.rate-ms=10000

# JSON и Логи
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.example.errorfree=INFO